services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    ports:
      - "127.0.0.1:5900:5900"  # VNC for 2FA only (loopback)
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4003 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 5
    environment:
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD_FILE: /run/secrets/ib_password
      TRADING_MODE: ${TRADING_MODE:-paper}
      READ_ONLY_API: ${READ_ONLY_API:-yes}
    secrets:
      - ib_password
    volumes:
      - ib-settings:/home/ibgateway/Jts
    restart: unless-stopped

  ibroker-mkt-data:
    build:
      context: .
      dockerfile: docker/ibroker-mkt-data/Dockerfile
    network_mode: host
    environment:
      MDW_IB_HOST: host.docker.internal  # Always use Docker-to-host bridge (not .env)
      MDW_IB_PORT: ${MDW_IB_PORT:-4001}
      MDW_WAREHOUSE_DIR: /tmp/data-lake
      MDW_DATA_LAKE: /tmp/data-lake
      MDW_SCHEDULE_HOUR: ${MDW_SCHEDULE_HOUR:-16}
      MDW_SCHEDULE_MINUTE: ${MDW_SCHEDULE_MINUTE:-5}
      MDW_SCHEDULE_TZ: ${MDW_SCHEDULE_TZ:-US/Eastern}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET:-market-data}
    restart: unless-stopped

secrets:
  ib_password:
    file: ./secrets/ib_password.txt

volumes:
  ib-settings:
